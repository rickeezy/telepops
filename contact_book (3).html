<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damone Henderson — Contact Book</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0a0a0b;
    --bg2:#111113;
    --bg3:#18181c;
    --bg4:#1e1e24;
    --surface:#242429;
    --surface2:#2c2c34;
    --border:#2e2e38;
    --border2:#3d3d4a;
    --accent:#4f7cff;
    --accent2:#6e9aff;
    --green:#22c77a;
    --amber:#f5a623;
    --red:#f55;
    --text:#f0f0f5;
    --text2:#9898b0;
    --text3:#5e5e72;
    --radius:10px;
    --radius-lg:16px;
  }
  html,body{height:100%;margin:0;padding:0}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
  /* HEADER */
  .header{display:flex;align-items:center;gap:16px;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:100}
  .logo{width:36px;height:36px;border-radius:10px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .header-title{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .header-sub{font-size:12px;color:var(--text3);margin-top:1px}
  .header-search{flex:1;max-width:360px;margin-left:auto;position:relative}
  .header-search input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 12px 8px 36px;font-size:13px;color:var(--text);font-family:inherit;outline:none;transition:border .2s}
  .header-search input:focus{border-color:var(--accent)}
  .header-search input::placeholder{color:var(--text3)}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:all .15s}
  .btn:hover{background:var(--surface2);border-color:var(--border2)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:#3d6aee;border-color:#3d6aee}
  /* LAYOUT */
  .app{display:flex;flex:1;overflow:hidden;min-height:0}
  /* SIDEBAR */
  .sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden;min-height:0}
  .alpha-nav{display:flex;flex-wrap:wrap;gap:2px;padding:12px 16px 8px;border-bottom:1px solid var(--border)}
  .alpha-nav button{width:24px;height:24px;border-radius:5px;border:none;background:transparent;color:var(--text3);font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .alpha-nav button:hover{background:var(--surface);color:var(--text)}
  .alpha-nav button.active{background:var(--accent);color:#fff}
  .contact-list{flex:1;overflow-y:auto;padding:8px 0;min-height:0}
  .contact-list::-webkit-scrollbar{width:4px}
  .contact-list::-webkit-scrollbar-track{background:transparent}
  .contact-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  .contact-group-header{padding:6px 16px;font-size:11px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase;position:sticky;top:0;background:var(--bg2);z-index:1}
  .contact-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;transition:background .1s;border-left:2px solid transparent}
  .contact-item:hover{background:var(--surface)}
  .contact-item.active{background:var(--bg3);border-left-color:var(--accent)}
  .contact-avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
  .contact-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .contact-phone-sm{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
  /* MAIN DETAIL */
  .main{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column;min-height:0}
  .main::-webkit-scrollbar{width:4px}
  .main::-webkit-scrollbar-track{background:transparent}
  .main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
  .empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);gap:12px}
  .empty-icon{font-size:48px;opacity:.3}
  .empty-text{font-size:14px}
  /* DETAIL PANEL */
  .detail{padding:32px 40px;max-width:680px;width:100%}
  .detail-hero{display:flex;align-items:center;gap:20px;margin-bottom:32px}
  .detail-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:600;flex-shrink:0}
  .detail-name{font-size:24px;font-weight:600;letter-spacing:-.02em}
  .detail-service{font-size:13px;color:var(--text3);margin-top:4px}
  .action-row{display:flex;gap:10px;margin-bottom:32px}
  .action-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 20px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);cursor:pointer;transition:all .15s;flex:1;min-width:80px}
  .action-btn:hover{background:var(--surface);border-color:var(--border2);transform:translateY(-1px)}
  .action-btn svg{width:22px;height:22px}
  .action-btn span{font-size:11px;color:var(--text3);font-weight:500}
  .action-btn.call-btn svg{color:var(--green)}
  .action-btn.sms-btn svg{color:var(--accent2)}
  .action-btn.email-btn svg{color:var(--amber)}
  .info-section{margin-bottom:24px}
  .info-section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
  .info-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
  .info-row{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--border)}
  .info-row:last-child{border-bottom:none}
  .info-label{font-size:12px;color:var(--text3);width:130px;flex-shrink:0}
  .info-value{font-size:13px;color:var(--text);font-weight:500}
  .info-value a{color:var(--accent2);text-decoration:none}
  .info-value a:hover{text-decoration:underline}
  .info-value.mono{font-family:'DM Mono',monospace;font-size:12px}
  .tag{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .tag-yes{background:rgba(34,199,122,.12);color:var(--green)}
  .tag-no{background:rgba(255,85,85,.12);color:var(--red)}
  /* STATS ROW */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
  .stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
  .stat-label{font-size:11px;color:var(--text3);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
  .stat-value{font-size:20px;font-weight:600;letter-spacing:-.01em}
  /* IMPORT MODAL */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:1000;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:32px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:18px;font-weight:600;margin-bottom:6px}
  .modal-sub{font-size:13px;color:var(--text3);margin-bottom:24px}
  .drop-zone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:40px;text-align:center;cursor:pointer;transition:all .2s}
  .drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(79,124,255,.05)}
  .drop-icon{font-size:32px;margin-bottom:8px;opacity:.5}
  .drop-text{font-size:13px;color:var(--text3)}
  /* VALIDATION TABLE */
  .vtable{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px}
  .vtable th{text-align:left;padding:8px 12px;background:var(--surface);color:var(--text3);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.04em}
  .vtable td{padding:8px 12px;border-bottom:1px solid var(--border)}
  .vtable tr:hover td{background:var(--bg3)}
  .vtable input{background:transparent;border:none;color:var(--text);font-family:inherit;font-size:12px;width:100%;outline:none}
  .vtable input:focus{border-bottom:1px solid var(--accent)}
  .cell-error{background:rgba(255,85,85,.07)}
  .cell-ok{color:var(--green)}
  .cell-warn{color:var(--amber)}
  .modal-footer{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
  /* TOAST */
  .toast{position:fixed;bottom:24px;right:24px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:12px 18px;font-size:13px;z-index:2000;opacity:0;transform:translateY(12px);transition:all .25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateY(0)}
  /* COUNT BADGE */
  .count-badge{display:inline-flex;align-items:center;justify-content:center;background:var(--surface);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--text3);margin-left:auto}
  /* NO RESULTS */
  .no-results{padding:24px 16px;text-align:center;font-size:13px;color:var(--text3)}
  /* HEADER STATS */
  .hstats{display:flex;gap:24px;align-items:center;padding:0 24px;margin-left:auto}
  .hstat{text-align:center}
  .hstat-val{font-size:15px;font-weight:600;color:var(--text)}
  .hstat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">✂</div>
  <div>
    <div class="header-title">Damone Henderson</div>
    <div class="header-sub">Client Contact Book</div>
  </div>
  <div class="header-search">
    <svg class="search-icon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="searchInput" placeholder="Search by name, phone, email…" oninput="handleSearch(this.value)">
  </div>
  <div class="hstats" id="headerStats"></div>
  <div style="display:flex;gap:8px;margin-left:16px">
    <button class="btn btn-primary" onclick="showImport()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import
    </button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="alpha-nav" id="alphaNav"></div>
    <div class="contact-list" id="contactList"></div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="main" id="mainPanel">
    <div class="empty-state">
      <div class="empty-icon">👤</div>
      <div class="empty-text">Select a contact to view details</div>
    </div>
  </div>
</div>

<!-- IMPORT MODAL -->
<div class="overlay" id="importOverlay" style="display:none" onclick="if(event.target===this)closeImport()">
  <div class="modal">
    <div class="modal-title">Import Contacts</div>
    <div class="modal-sub">Upload a CSV or Excel file. We'll validate all fields and let you correct any issues before adding.</div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)">
      <div class="drop-icon">📂</div>
      <div style="font-size:14px;font-weight:500;margin-bottom:4px">Drop file here or click to browse</div>
      <div class="drop-text">Supports .xlsx, .xls, .csv</div>
    </div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleFileSelect(event)">
    <div id="validationArea"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeImport()">Cancel</button>
      <button class="btn btn-primary" id="importConfirmBtn" style="display:none" onclick="confirmImport()">Add Contacts</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

function init(){
  allContacts=JSON.parse(CONTACTS_JSON);
  allContacts.sort((a,b)=>a.name.localeCompare(b.name));
  filteredContacts=[...allContacts];
  buildAlphaNav();
  renderList();
  updateHeaderStats();
}

function updateHeaderStats(){
  const total=allContacts.length;
  const withPhone=allContacts.filter(c=>c.phone&&c.phone!='()  -').length;
  const withEmail=allContacts.filter(c=>c.email).length;
  document.getElementById('headerStats').innerHTML=`
    <div class="hstat"><div class="hstat-val">${total.toLocaleString()}</div><div class="hstat-lbl">Contacts</div></div>
    <div class="hstat"><div class="hstat-val">${withPhone.toLocaleString()}</div><div class="hstat-lbl">With Phone</div></div>
    <div class="hstat"><div class="hstat-val">${withEmail.toLocaleString()}</div><div class="hstat-lbl">With Email</div></div>
  `;
}

function buildAlphaNav(){
  const letters=['ALL',...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'];
  const present=new Set(allContacts.map(c=>c.name[0]?.toUpperCase()).filter(Boolean));
  const nav=document.getElementById('alphaNav');
  nav.innerHTML='';
  letters.forEach(l=>{
    const btn=document.createElement('button');
    btn.textContent=l==='ALL'?'★':l;
    btn.title=l;
    btn.disabled=(l!=='ALL'&&!present.has(l));
    btn.style.opacity=btn.disabled?.3:1;
    if(l===activeLetter)btn.classList.add('active');
    btn.onclick=()=>{
      activeLetter=l;
      document.querySelectorAll('.alpha-nav button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filterByLetter();
    };
    nav.appendChild(btn);
  });
}

function filterByLetter(){
  const search=document.getElementById('searchInput').value.toLowerCase();
  filteredContacts=allContacts.filter(c=>{
    const matchLetter=activeLetter==='ALL'||c.name[0]?.toUpperCase()===activeLetter;
    const matchSearch=!search||c.name.toLowerCase().includes(search)||
      c.phone.includes(search)||c.email.toLowerCase().includes(search);
    return matchLetter&&matchSearch;
  });
  renderList();
}

function handleSearch(val){
  filterByLetter();
}

function renderList(){
  const list=document.getElementById('contactList');
  if(filteredContacts.length===0){
    list.innerHTML='<div class="no-results">No contacts found</div>';
    return;
  }
  let html='';
  let lastLetter='';
  filteredContacts.forEach((c,i)=>{
    const letter=c.name[0]?.toUpperCase()||'#';
    if(letter!==lastLetter){
      const cnt=filteredContacts.filter(x=>x.name[0]?.toUpperCase()===letter).length;
      html+=`<div class="contact-group-header">${letter} <span class="count-badge">${cnt}</span></div>`;
      lastLetter=letter;
    }
    const isActive=activeIdx===i;
    html+=`<div class="contact-item${isActive?' active':''}" onclick="showContact(${i})" data-idx="${i}">
      <div class="contact-avatar" style="${avatarStyle(c.name)}">${initials(c.name)}</div>
      <div style="min-width:0">
        <div class="contact-name">${esc(c.name)}</div>
        <div class="contact-phone-sm">${c.phone||'—'}</div>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}

function copyPhone(phone){

function esc(str){
  if(!str)return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function dropFile(e){
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const file=e.dataTransfer.files[0];
  if(file)processFile(file);
}

function handleFileSelect(e){
  const file=e.target.files[0];
  if(file)processFile(file);
}

function processFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      let rows=[];
      if(file.name.endsWith('.csv')){
        const text=e.target.result;
        const lines=text.split('\n').filter(l=>l.trim());
        const headers=lines[0].split(',').map(h=>h.trim().replace(/"/g,''));
        rows=lines.slice(1).map(line=>{
          const vals=line.split(',').map(v=>v.trim().replace(/"/g,''));
          const obj={};
          headers.forEach((h,i)=>obj[h]=vals[i]||'');
          return obj;
        });
      } else {
        const data=new Uint8Array(e.target.result);
        const wb=XLSX.read(data,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        rows=XLSX.utils.sheet_to_json(ws,{defval:''});
      }
      buildValidationForm(rows);
    }catch(err){
      showToast('Error reading file: '+err.message);
    }
  };
  if(file.name.endsWith('.csv')){reader.readAsText(file);}
  else{reader.readAsArrayBuffer(file);}
}

const FIELD_MAP={
  'name':['name','customer name','full name','client name','contact name'],
  'phone':['phone','phone number','mobile','cell','telephone'],
  'email':['email','email address','e-mail'],
  'lastVisit':['last visit','last visit date','visit date','date'],
  'lastService':['last service','service','product','last service/product'],
  'notes':['notes','note','comments'],
};

function guessField(header){
  const h=header.toLowerCase().trim();
  for(const [field,variants] of Object.entries(FIELD_MAP)){
    if(variants.some(v=>h.includes(v)))return field;
  }
  return null;
}

function buildValidationForm(rows){
  if(rows.length===0){
    showToast('No data found in file');
    return;
  }
  const headers=Object.keys(rows[0]);
  const fieldGuess={};
  headers.forEach(h=>{const g=guessField(h);if(g&&!fieldGuess[g])fieldGuess[g]=h;});

  // Map rows to contact format
  importedContacts=rows.slice(0,500).map(r=>{
    const contact={
      name:r[fieldGuess.name]||'',
      phone:r[fieldGuess.phone]||'',
      phoneRaw:(r[fieldGuess.phone]||'').replace(/\D/g,''),
      email:r[fieldGuess.email]||'',
      lastVisit:r[fieldGuess.lastVisit]||'',
      lastService:r[fieldGuess.lastService]||'',
      notes:r[fieldGuess.notes]||'',
      barber:'',payment:'',channel:'',optOutEmail:'',optOutSMS:''
    };
    return contact;
  });

  // Validate
  const issues=[];
  importedContacts.forEach((c,i)=>{
    if(!c.name)issues.push({row:i+1,field:'name',issue:'Missing name'});
    if(!c.phone&&!c.email)issues.push({row:i+1,field:'phone',issue:'No phone or email'});
    if(c.phone&&c.phoneRaw.length<10)issues.push({row:i+1,field:'phone',issue:'Invalid phone'});
  });

  const nullPct=Math.round((issues.length/importedContacts.length)*100);
  const dupNames=importedContacts.filter(c=>allContacts.some(e=>e.name.toLowerCase()===c.name.toLowerCase()));

  let html=`<div style="margin-top:20px">
    <div style="display:flex;gap:16px;margin-bottom:16px">
      <div class="stat-card" style="flex:1"><div class="stat-label">Rows Found</div><div class="stat-value">${importedContacts.length}</div></div>
      <div class="stat-card" style="flex:1"><div class="stat-label">Issues</div><div class="stat-value" style="color:${issues.length?'var(--amber)':'var(--green)'}">${issues.length}</div></div>
      <div class="stat-card" style="flex:1"><div class="stat-label">Duplicates</div><div class="stat-value" style="color:${dupNames.length?'var(--amber)':'var(--green)'}">${dupNames.length}</div></div>
    </div>`;

  if(issues.length>0){
    html+=`<div style="font-size:12px;color:var(--amber);margin-bottom:8px;font-weight:600">⚠ ${issues.length} issue${issues.length>1?'s':''} found — review below</div>`;
  }

  // Show first 20 rows in editable table
  html+=`<div style="overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)">
  <table class="vtable">
    <thead><tr>
      <th style="width:30px">#</th>
      <th>Name</th><th>Phone</th><th>Email</th><th>Last Visit</th><th>Status</th>
    </tr></thead>
    <tbody>`;

  importedContacts.slice(0,50).forEach((c,i)=>{
    const rowIssues=issues.filter(is=>is.row===i+1);
    const isDup=allContacts.some(e=>e.name.toLowerCase()===c.name.toLowerCase());
    const status=rowIssues.length?`<span style="color:var(--amber);font-size:11px">⚠ ${rowIssues.map(x=>x.issue).join(', ')}</span>`:
      isDup?`<span style="color:var(--text3);font-size:11px">↻ Duplicate</span>`:
      `<span style="color:var(--green);font-size:11px">✓ OK</span>`;
    html+=`<tr>
      <td style="color:var(--text3)">${i+1}</td>
      <td class="${!c.name?'cell-error':''}"><input id="imp_name_${i}" value="${esc(c.name)}" onchange="importedContacts[${i}].name=this.value" placeholder="Required"></td>
      <td class="${c.phone&&c.phoneRaw.length<10?'cell-error':''}"><input id="imp_phone_${i}" value="${esc(c.phone)}" onchange="importedContacts[${i}].phone=this.value;importedContacts[${i}].phoneRaw=this.value.replace(/\\D/g,'')" placeholder="(xxx) xxx-xxxx"></td>
      <td><input value="${esc(c.email)}" onchange="importedContacts[${i}].email=this.value" placeholder="email@example.com"></td>
      <td><input value="${esc(c.lastVisit)}" onchange="importedContacts[${i}].lastVisit=this.value" placeholder="yyyy-mm-dd"></td>
      <td>${status}</td>
    </tr>`;
  });
  if(importedContacts.length>50){
    html+=`<tr><td colspan="6" style="text-align:center;color:var(--text3);font-style:italic">… and ${importedContacts.length-50} more rows</td></tr>`;
  }
  html+=`</tbody></table></div></div>`;

  document.getElementById('validationArea').innerHTML=html;
  document.getElementById('importConfirmBtn').style.display='inline-flex';
}

function confirmImport(){
  const valid=importedContacts.filter(c=>c.name);
  let added=0,updated=0;
  valid.forEach(c=>{
    const existing=allContacts.findIndex(e=>e.name.toLowerCase()===c.name.toLowerCase());
    if(existing>=0){
      allContacts[existing]={...allContacts[existing],...c};
      updated++;
    } else {
      allContacts.push(c);
      added++;
    }
  });
  allContacts.sort((a,b)=>a.name.localeCompare(b.name));
  filteredContacts=[...allContacts];
  buildAlphaNav();
  renderList();
  updateHeaderStats();
  closeImport();
  showToast(`Added ${added} contacts, updated ${updated}`);
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

init();
</script>
</body>
</html>
