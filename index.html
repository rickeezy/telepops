<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pop's TV — Affordable Streaming</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07070e;--bg2:#0e0e1c;--bg3:#141428;--bg4:#1c1c38;--red:#ff2d4e;--gold:#f9b233;--cyan:#00d4ff;--white:#f0f0f8;--muted:#888aaa;--border:#1c1c38;--success:#10d97e;--warn:#f9b233;--danger:#ff2d4e;--info:#00d4ff;--card:#0d0d1e;--card-border:#1e1e3c;}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
.nav{background:rgba(7,7,14,.95);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;flex-wrap:wrap;backdrop-filter:blur(12px)}
.nav-brand{display:flex;align-items:center;gap:10px;padding:14px 18px 14px 0;border-right:1px solid var(--border);margin-right:16px;cursor:pointer}
.nav-logo{width:34px;height:34px;background:linear-gradient(135deg,var(--red),#8c0028);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:#fff}
.nav-title{font-family:'Syne',sans-serif;font-weight:800;font-size:16px}
.nav-title span{color:var(--gold)}
.nav-tab{padding:16px 15px;cursor:pointer;font-size:13px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-weight:500}
.nav-tab:hover{color:var(--white)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-end{margin-left:auto;display:flex;align-items:center;gap:10px;padding:8px 0}
.btn{display:inline-flex;align-items:center;gap:7px;padding:11px 20px;border-radius:10px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#cc0030;transform:translateY(-1px)}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:#d9940f}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--white)}.btn-outline:hover{background:var(--bg3)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}
.btn-lg{padding:14px 28px;font-size:15px;border-radius:12px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--white);font-size:13px;outline:none;transition:border-color .2s;font-family:'DM Sans',sans-serif}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(249,178,51,.08)}
.form-select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:18px}
@media(max-width:1000px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:22px}
.pricing-card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;padding:26px;text-align:center;position:relative;transition:all .2s;cursor:pointer}
.pricing-card:hover{transform:translateY(-4px);border-color:rgba(249,178,51,.4)}
.pricing-card.featured{border-color:var(--gold);border-width:2px;background:rgba(249,178,51,.03)}
.pricing-card.selected{border-color:var(--gold);border-width:2px;background:rgba(249,178,51,.07)}
.popular-badge{background:var(--gold);color:#000;font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;display:inline-block;margin-bottom:12px}
.plan-price{font-family:'Syne',sans-serif;font-size:38px;font-weight:900;margin-bottom:2px}
.plan-period{font-size:12px;color:var(--muted);margin-bottom:18px}
.plan-features{list-style:none;margin-bottom:22px;text-align:left}
.plan-features li{padding:7px 0;font-size:12px;color:var(--muted);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.plan-features li::before{content:'checkmark';content:'✓';color:var(--success);font-weight:700;flex-shrink:0}
.hero{position:relative;background:linear-gradient(180deg,#09000e 0%,#14001e 40%,#07070e 100%);padding:100px 24px 80px;text-align:center;border-bottom:1px solid var(--border);overflow:hidden}
.hero-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse,rgba(255,45,78,.13) 0%,transparent 60%);pointer-events:none}
.hero h1{font-family:'Syne',sans-serif;font-size:clamp(32px,6vw,70px);font-weight:900;line-height:1.05;margin-bottom:18px;position:relative}
.grad{background:linear-gradient(135deg,var(--red),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{color:var(--muted);font-size:17px;max-width:560px;margin:0 auto 36px;line-height:1.65;position:relative}
.hero-btns{display:flex;gap:13px;justify-content:center;flex-wrap:wrap;margin-bottom:52px;position:relative}
.section{padding:80px 24px}
.section h2{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;text-align:center;margin-bottom:10px}
.section .sub{color:var(--muted);text-align:center;font-size:15px;margin-bottom:44px;line-height:1.6}
.section.alt{background:var(--bg2)}
.benefit-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:18px;display:flex;align-items:flex-start;gap:13px;transition:border-color .2s}
.benefit-card:hover{border-color:rgba(249,178,51,.3)}
.faq-item{border-bottom:1px solid var(--border);padding:16px 0}
.faq-q{display:flex;justify-content:space-between;align-items:center;cursor:pointer;font-weight:600;font-size:14px;gap:12px}
.faq-a{color:var(--muted);font-size:13px;line-height:1.7;margin-top:12px}
.onboard-steps{display:flex;align-items:center;gap:0;margin-bottom:28px;overflow-x:auto;padding-bottom:4px}
.ob-step{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ob-num{width:30px;height:30px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted)}
.ob-num.active{border-color:var(--gold);color:var(--gold);background:rgba(249,178,51,.1)}
.ob-num.done{border-color:var(--success);background:var(--success);color:#000}
.ob-label{font-size:12px;color:var(--muted);white-space:nowrap}
.ob-label.active{color:var(--white);font-weight:600}
.ob-line{width:22px;height:2px;background:var(--border);flex-shrink:0;margin:0 3px}
.ob-line.done{background:var(--success)}
.calc-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.calc-row:last-child{border-bottom:none}
.toggle-pill{display:flex;background:var(--bg3);border-radius:20px;padding:2px;border:1px solid var(--border)}
.pill-opt{padding:4px 12px;border-radius:18px;font-size:11px;cursor:pointer;color:var(--muted);transition:all .15s}
.pill-opt.active{background:var(--red);color:#fff}
.email-status{padding:11px 15px;border-radius:9px;font-size:13px;margin-top:12px;display:none}
.email-status.sending{display:block;background:rgba(59,130,246,.1);border:1px solid var(--info);color:var(--info)}
.email-status.sent{display:block;background:rgba(16,217,126,.1);border:1px solid var(--success);color:var(--success)}
.notif{position:fixed;top:20px;right:20px;background:var(--bg2);border:1px solid var(--success);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--success);z-index:999;animation:slideIn .3s ease;max-width:320px}
@keyframes slideIn{from{transform:translateX(120%)}to{transform:translateX(0)}}
.notif.error{border-color:var(--danger);color:var(--danger)}
.pay-method{display:flex;align-items:center;gap:12px;cursor:pointer;padding:13px 15px;border:1px solid var(--border);border-radius:10px;transition:all .15s;margin-bottom:9px}
.pay-method:hover{border-color:var(--muted)}
.pay-method.selected{border-color:var(--gold);background:rgba(249,178,51,.05)}
.pay-method input[type=radio]{accent-color:var(--gold)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-brand" onclick="nav('home')">
    <div class="nav-logo">P</div>
    <div class="nav-title">Pop's <span>TV</span></div>
  </div>
  <div class="nav-tab" id="tab-home" onclick="nav('home')">🏠 Home</div>
  <div class="nav-tab" id="tab-pricing" onclick="nav('pricing')">📋 Pricing</div>
  <div class="nav-tab" id="tab-signup" onclick="nav('signup')">✅ Get Started</div>
  <div class="nav-end">
    <button class="btn btn-outline btn-sm" onclick="nav('signup')">Sign Up</button>
    <button class="btn btn-primary btn-sm" onclick="nav('signup')">🚀 Get Started</button>
  </div>
</nav>
<div id="page-content"></div>
<script>
const APP={page:'home',faqOpen:null,onboardStep:1,newCustomer:{},calcPeriod:'monthly',streamSelected:{},streamAds:{}};
// 2026 accurate streaming prices (Netflix Mar 2026, Disney/Hulu/ESPN Oct 2025, HBO Max Oct 2025, Peacock Jul 2025, Paramount+ Jan 2026, Apple TV+ late 2025)
const STREAMING_SERVICES=[
  {id:'netflix',icon:'\uD83C\uDFAC',name:'Netflix',note:'Standard plan',withAds:8.99,noAds:19.99},
  {id:'hulu',icon:'\uD83D\uDCFA',name:'Hulu',note:'Live TV',withAds:82.99,noAds:82.99,noAdLabel:'No ads +$18'},
  {id:'espn',icon:'\uD83C\uDFC8',name:'ESPN+',note:'Sports only',withAds:11.99,noAds:null,noAdLabel:'No ads tier'},
  {id:'hbomax',icon:'\uD83C\uDFAD',name:'HBO Max',note:'Movies / shows',withAds:10.99,noAds:16.99},
  {id:'disney',icon:'\uD83C\uDFF0',name:'Disney+',note:'Family / movies',withAds:11.99,noAds:18.99},
  {id:'paramount',icon:'\u2B50',name:'Paramount+',note:'CBS / movies',withAds:8.99,noAds:13.99},
  {id:'appletv',icon:'\uD83C\uDF4E',name:'Apple TV+',note:'Originals',withAds:null,noAds:12.99,noAdLabel:'No ads tier'},
  {id:'peacock',icon:'\uD83E\uDD9A',name:'Peacock',note:'NBC / sports',withAds:10.99,noAds:16.99},
];
const PLANS=[
  {name:'Monthly',price:25,period:'per month',days:30,features:['All live channels','Movies & TV shows','Basic sports','2 device streams','Setup support'],popular:false},
  {name:'Quarterly',price:65,period:'3 months / $21.67/mo',days:90,features:['All live channels','Movies & TV shows','Sports & PPV','3 device streams','Priority support'],popular:false},
  {name:'6-Month',price:120,period:'6 months / $20/mo',days:180,features:['All live channels','Movies & TV shows','All sports & PPV','4 device streams','Priority support','VPN included'],popular:true},
  {name:'Annual',price:220,period:'per year / $18.33/mo',days:365,features:['All live channels','Movies & TV shows','All sports & PPV','5 device streams','24/7 support','VPN included','Best value'],popular:false},
];
const COMPETITORS=[
  {icon:'📡',name:'Cable TV',note:'Basic package',monthly:89,annual:1068},
  {icon:'📺',name:'DirecTV',note:'+ fees',monthly:79,annual:948},
  {icon:'🍿',name:'Netflix + Hulu + ESPN',note:'Combined',monthly:65,annual:780},
  {icon:'📱',name:'Sling TV',note:'Orange+Blue',monthly:55,annual:660},
  {icon:'🎯',name:'YouTube TV',note:'Base plan',monthly:73,annual:876},
];
const FAQS=[
  {q:"What devices work with Pop's TV?",a:"Pop's TV works on Android TV devices (ONN Stick, Firestick), Smart TVs, Android phones/tablets, and iPhones. Standard Roku TVs (without a streaming stick) are NOT compatible. We provide ONN sticks directly!"},
  {q:"How do I get my login?",a:"After payment is confirmed, we text your username and password within minutes. Your username is auto-generated from your name + last 4 digits of your phone. Your password is your phone number."},
  {q:"What happens if my service expires?",a:"Service pauses. Send payment and we reactivate usually within the hour. We'll text you reminders 7 days before expiration."},
  {q:"Can I get the ONN stick from you?",a:"Yes! We offer ONN HD and ONN 4K streaming sticks. We can deliver through our field techs and do the full setup for you."},
  {q:"Is payment online?",a:"Payment is handled offline via Cash App ($PopsTVStream), Zelle, or in-person cash. We keep things simple and private."},
  {q:"Can I become a reseller?",a:"Absolutely. Earn 15% recurring commission on every customer you bring in. Contact us to get your referral code."},
];
let notifT;
function showNotif(msg,type='success'){if(notifT)clearTimeout(notifT);const old=document.querySelector('.notif');if(old)old.remove();const el=document.createElement('div');el.className='notif'+(type!=='success'?' '+type:'');el.textContent=msg;document.body.appendChild(el);notifT=setTimeout(()=>el.remove(),4000);}
function nav(p){APP.page=p;APP.faqOpen=null;renderPage();window.scrollTo(0,0);document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));const el=document.getElementById('tab-'+p);if(el)el.classList.add('active');}
function genUsername(n,ph){const f=(n||'User').split(' ')[0];const d=(ph||'').replace(/\D/g,'').slice(-4);return f.charAt(0).toUpperCase()+f.slice(1).toLowerCase()+d;}
function genPassword(ph){return(ph||'').replace(/\D/g,'');}
function renderStreamingCalc(){
  // Build the streaming services calculator rows with per-service ads toggle
  const rows = STREAMING_SERVICES.map(s=>{
    const checked = APP.streamSelected[s.id] !== false; // default all selected
    const useAds = APP.streamAds[s.id] !== false; // default w/ ads
    const price = useAds && s.withAds !== null ? s.withAds : (!useAds && s.noAds !== null ? s.noAds : (s.withAds||s.noAds));
    const hasAdToggle = s.withAds !== null && s.noAds !== null;
    const adsOnlyLabel = s.noAds === null ? (s.noAdLabel||'No ads tier') : null;
    const noAdsOnlyLabel = s.withAds === null ? (s.noAdLabel||'No ads tier') : null;
    return `<div style="display:flex;align-items:center;padding:13px 0;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap">
      <label style="display:flex;align-items:center;gap:0;cursor:pointer;flex-shrink:0">
        <input type="checkbox" ${checked?'checked':''} style="display:none" onchange="APP.streamSelected['${s.id}']=this.checked;renderPage()">
        <div style="width:20px;height:20px;border-radius:5px;border:2px solid ${checked?'var(--red)':'var(--border)'};background:${checked?'var(--red)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s">${checked?'✓':''}</div>
      </label>
      <div style="font-size:22px;flex-shrink:0">${s.icon}</div>
      <div style="flex:1;min-width:100px">
        <div style="font-size:13px;font-weight:600;${!checked?'color:var(--muted)':''}">${s.name}</div>
        <div style="font-size:11px;color:var(--muted)">${s.note}</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        ${hasAdToggle ? `<div style="display:flex;gap:4px">
          <div onclick="APP.streamAds['${s.id}']=true;renderPage()" style="padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;background:${useAds?'var(--red)':'var(--bg3)'};color:${useAds?'#fff':'var(--muted)'};border:1px solid ${useAds?'var(--red)':'var(--border)'}">w/ Ads</div>
          <div onclick="APP.streamAds['${s.id}']=false;renderPage()" style="padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;background:${!useAds?'var(--red)':'var(--bg3)'};color:${!useAds?'#fff':'var(--muted)'};border:1px solid ${!useAds?'var(--red)':'var(--border)'}">No Ads</div>
        </div>` : `<div style="padding:4px 11px;border-radius:20px;font-size:11px;color:var(--muted);border:1px solid var(--border);background:var(--bg3)">${adsOnlyLabel||noAdsOnlyLabel||'Fixed'}</div>`}
        <div style="font-size:15px;font-weight:700;color:${checked?'var(--warn)':'var(--muted)'};min-width:56px;text-align:right">$${price.toFixed(2)}</div>
      </div>
    </div>`;
  }).join('');

  // Calculate total for selected services
  const total = STREAMING_SERVICES.reduce((sum, s)=>{
    const checked = APP.streamSelected[s.id] !== false;
    if(!checked) return sum;
    const useAds = APP.streamAds[s.id] !== false;
    const price = useAds && s.withAds !== null ? s.withAds : (!useAds && s.noAds !== null ? s.noAds : (s.withAds||s.noAds));
    return sum + price;
  }, 0);
  const savings = Math.max(0, total - 25);
  const selectedCount = STREAMING_SERVICES.filter(s=>APP.streamSelected[s.id]!==false).length;

  return `${rows}
    <div style="background:var(--bg3);border-radius:12px;padding:18px;margin-top:16px">
      <div style="text-align:center;font-size:12px;color:var(--muted);margin-bottom:12px">All ${selectedCount} selected services combined</div>
      <div style="display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:12px">
        <div style="text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:900;color:var(--danger);text-decoration:line-through;opacity:.7">$${total.toFixed(2)}/mo</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px">Other services</div>
        </div>
        <div style="background:var(--red);color:#fff;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px">vs</div>
        <div style="text-align:center">
          <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:900;color:var(--gold)">$25/mo</div>
          <div style="font-size:11px;color:var(--success);margin-top:2px">Pop's TV — Everything</div>
        </div>
      </div>
      <div style="text-align:center;font-size:14px;font-weight:700;color:var(--success)">You save $${savings.toFixed(2)} every month with Pop's TV 🎉</div>
    </div>
    <div style="text-align:center;margin-top:14px">
      <button class="btn btn-gold" onclick="nav('signup')" style="font-size:13px">🚀 Get Pop's TV for $25/mo →</button>
    </div>`;
}

function renderPage(){const el=document.getElementById('page-content');if(APP.page==='home')el.innerHTML=renderHome();else if(APP.page==='pricing')el.innerHTML=renderPricing();else if(APP.page==='signup')el.innerHTML=renderSignup();}

function renderHome(){
  return`
  <div class="hero" style="position:relative">
    <div class="hero-glow"></div>
    <div style="position:relative;max-width:1200px;margin:0 auto">
      <div style="display:inline-flex;align-items:center;gap:8px;background:rgba(255,45,78,.12);border:1px solid rgba(255,45,78,.25);border-radius:20px;padding:6px 16px;font-size:12px;font-weight:600;color:var(--red);margin-bottom:20px">
        <span style="width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 2s infinite"></span>
        LIVE · NFL · NBA · PPV · 10,000+ Channels
      </div>
      <h1>Stream Everything.<br><span class="grad">Cut the Cable Bill.</span></h1>
      <p style="position:relative">Live TV, movies, sports, PPV, international channels — all in one place. Starting at $25/month. No contracts. ONN sticks delivered to your door.</p>
      <div class="hero-btns">
        <button class="btn btn-primary btn-lg" onclick="nav('signup')">🚀 Get Started Now</button>
        <button class="btn btn-gold btn-lg" onclick="nav('pricing')">📋 View Plans & Pricing</button>
      </div>
      <div style="display:flex;gap:32px;justify-content:center;flex-wrap:wrap;position:relative">
        ${[['10,000+','Live Channels'],['$25','Starting/Month'],['ONN Sticks','Available'],['24/7','Support'],['100+','Happy Customers']].map(([v,l])=>`<div style="text-align:center"><div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gold)">${v}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${l}</div></div>`).join('')}
      </div>
    </div>
  </div>
  <div class="section">
    <div style="max-width:1100px;margin:0 auto">

function previewCreds(){
  const phone=(document.getElementById('ob-phone')||{}).value||'';
  const name=(document.getElementById('ob-name')||{}).value||'';
  const pv=document.getElementById('cred-preview');
  const pu=document.getElementById('prev-user');
  const pp=document.getElementById('prev-pass');
  if(pv)pv.style.display=phone.length>=7?'block':'none';
  if(pu&&phone.length>=7)pu.textContent=genUsername(name||'User',phone);
  if(pp&&phone.length>=7)pp.textContent=genPassword(phone)||'Your phone number';
}

function saveStep2(){
  const name=(document.getElementById('ob-name')||{}).value||'';
  const phone=(document.getElementById('ob-phone')||{}).value||'';
  const email=(document.getElementById('ob-email')||{}).value||'';
  if(!name||!phone){showNotif('Name and phone are required','error');return;}
  APP.newCustomer.name=name;APP.newCustomer.phone=phone;APP.newCustomer.email=email;
  APP.newCustomer.device=(document.getElementById('ob-device')||{}).value||'Firestick';
  APP.newCustomer.address=(document.getElementById('ob-addr')||{}).value||'';
  APP.onboardStep=3;renderPage();
}

function submitOrder(){
  const el=document.getElementById('email-status');
  if(el){el.className='email-status sending';el.textContent='📧 Sending confirmation emails...';}
  setTimeout(()=>{
    if(el){el.className='email-status sent';el.textContent='✅ Confirmation sent to '+(APP.newCustomer.email||'you')+' and to our team!';}
    setTimeout(()=>{APP.onboardStep=5;renderPage();},1500);
  },2000);
}
renderPage();
</script>
</body>
</html>
