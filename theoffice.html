<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pop's TV — Virtual Office</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--bg2:#0d0d1a;--bg3:#13132a;--bg4:#1a1a33;
  --red:#ff2d4e;--gold:#f9b233;--cyan:#00d4ff;
  --white:#f0f0f8;--muted:#7777aa;--border:#1a1a35;
  --success:#10d97e;--warn:#f9b233;--danger:#ff2d4e;--info:#00d4ff;
  --card:#0d0d1e;--card-border:#1e1e40;
}
body{background:var(--bg);color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh}

/* ---- LOGIN ---- */
#login-wrap{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,45,78,.12),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(0,212,255,.06),transparent 50%)}
.login-box{position:relative;background:var(--card);border:1px solid var(--card-border);border-radius:22px;padding:44px 40px;max-width:420px;width:100%;box-shadow:0 0 80px rgba(255,45,78,.1)}
.login-logo{width:60px;height:60px;background:linear-gradient(135deg,var(--red),#800030);border-radius:16px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:#fff;margin:0 auto 18px}
.login-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;text-align:center;margin-bottom:4px}
.login-sub{color:var(--muted);font-size:13px;text-align:center;margin-bottom:28px}
.login-role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.role-pill{padding:10px 8px;border:1px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;transition:all .15s;font-size:12px;color:var(--muted)}
.role-pill:hover{border-color:var(--gold);color:var(--white)}
.role-pill.selected{border-color:var(--gold);background:rgba(249,178,51,.08);color:var(--gold)}
.role-pill .role-icon{font-size:20px;margin-bottom:4px}
.role-pill .role-name{font-weight:600}
.l-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 16px;color:var(--white);font-size:14px;outline:none;font-family:'DM Sans',sans-serif;margin-bottom:10px;transition:border-color .2s}
.l-input:focus{border-color:var(--cyan)}
.btn-login{width:100%;background:linear-gradient(135deg,var(--red),#aa0028);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(255,45,78,.3)}
.login-err{background:rgba(255,45,78,.1);border:1px solid rgba(255,45,78,.3);border-radius:8px;padding:9px 13px;font-size:12px;color:var(--danger);margin-bottom:12px;display:none}
.login-err.show{display:block}
.admin-manage-link{text-align:center;margin-top:14px;font-size:12px;color:var(--muted)}
.admin-manage-link a{color:var(--cyan);cursor:pointer}

/* ---- NAV ---- */
.nav{background:rgba(13,13,26,.97);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:100;flex-wrap:wrap;backdrop-filter:blur(8px)}
.nav-brand{display:flex;align-items:center;gap:10px;padding:13px 16px 13px 0;border-right:1px solid var(--border);margin-right:10px;cursor:pointer}
.nav-logo{width:32px;height:32px;background:linear-gradient(135deg,var(--red),#900030);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:14px;color:#fff}
.nav-brand .name{font-family:'Syne',sans-serif;font-weight:700;font-size:15px}
.nav-brand .name span{color:var(--gold)}
.nav-tab{padding:15px 13px;cursor:pointer;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s;font-weight:500}
.nav-tab:hover{color:var(--white)}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.nav-end{margin-left:auto;display:flex;align-items:center;gap:10px;padding:8px 0}
.badge{background:var(--danger);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.warn-badge{background:var(--warn);color:#000;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}
.role-tag{background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:4px 10px;font-size:11px;color:var(--gold);font-weight:600}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:7px;padding:5px 12px;font-size:11px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
.logout-btn:hover{color:var(--danger);border-color:var(--danger)}

/* ---- LAYOUT ---- */
.page{padding:22px;max-width:1400px;margin:0 auto;width:100%}
.section-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;margin-bottom:4px}
.section-sub{color:var(--muted);font-size:13px;margin-bottom:20px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.grid5{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:12px}
@media(max-width:1100px){.grid5{grid-template-columns:1fr 1fr 1fr}}
@media(max-width:900px){.grid4{grid-template-columns:1fr 1fr}.grid3{grid-template-columns:1fr 1fr}.grid5{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid2,.grid3,.grid4,.grid5{grid-template-columns:1fr}}

/* ---- CARDS ---- */
.card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--white);display:flex;align-items:center;gap:7px}
.card-title::before{content:'';width:3px;height:12px;background:var(--gold);border-radius:2px}
.metric-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:18px;transition:border-color .2s}
.metric-card:hover{border-color:rgba(249,178,51,.3)}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px}
.metric-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--white)}
.metric-sub{font-size:12px;color:var(--muted);margin-top:4px}
.metric-sub.up{color:var(--success)}
.metric-sub.down{color:var(--danger)}

/* ---- BUTTONS ---- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:9px;border:none;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;font-family:'DM Sans',sans-serif}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:#cc0030}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{background:#d9940f}
.btn-outline{background:transparent;color:var(--white);border:1px solid var(--border)}.btn-outline:hover{background:var(--bg3)}
.btn-success{background:var(--success);color:#000}
.btn-danger{background:var(--danger);color:#fff}
.btn-info{background:var(--info);color:#000}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:7px}
.btn-xs{padding:4px 9px;font-size:10px;border-radius:6px}

/* ---- STATUS ---- */
.status{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.status::before{content:'';width:5px;height:5px;border-radius:50%}
.s-active{background:rgba(16,217,126,.12);color:var(--success)}.s-active::before{background:var(--success)}
.s-due{background:rgba(249,178,51,.12);color:var(--warn)}.s-due::before{background:var(--warn)}
.s-overdue{background:rgba(255,45,78,.12);color:var(--danger)}.s-overdue::before{background:var(--danger)}
.s-suspended{background:rgba(119,119,170,.12);color:var(--muted)}.s-suspended::before{background:var(--muted)}

/* ---- TABLE ---- */
.table-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--card-border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg3)}
th{padding:11px 13px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--border);font-weight:600}
td{padding:9px 13px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(249,178,51,.02)}

/* ---- FORMS ---- */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:600;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--white);font-size:13px;outline:none;transition:border-color .15s;font-family:'DM Sans',sans-serif}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(249,178,51,.08)}
.form-select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}

/* ---- MODAL ---- */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px;width:100%;max-width:600px;max-height:92vh;overflow-y:auto}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700}
.modal-body{padding:22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end}
.close-btn{width:28px;height:28px;background:var(--bg3);border:none;border-radius:6px;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.close-btn:hover{color:var(--white)}

/* ---- TABS ---- */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:18px;overflow-x:auto}
.tab{padding:9px 15px;cursor:pointer;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--white)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ---- SEARCH ---- */
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--white);font-size:13px;outline:none;font-family:'DM Sans',sans-serif}
.search-input:focus{border-color:var(--gold)}

/* ---- MISC ---- */
.notif{position:fixed;top:20px;right:20px;background:var(--bg2);border:1px solid var(--success);border-radius:10px;padding:12px 16px;font-size:13px;color:var(--success);z-index:999;animation:slideIn .3s ease;max-width:320px}
@keyframes slideIn{from{transform:translateX(120%)}to{transform:translateX(0)}}
.notif.error{border-color:var(--danger);color:var(--danger)}
.notif.info{border-color:var(--info);color:var(--info)}
.notif.warn{border-color:var(--warn);color:var(--warn)}
.sms-card{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:15px}
.sms-card .sms-type{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gold);margin-bottom:7px;font-weight:700}
.sms-card .sms-body{font-size:13px;color:var(--muted);line-height:1.6;background:var(--bg4);padding:11px;border-radius:8px;border-left:3px solid var(--gold);margin-bottom:9px;white-space:pre-line}
.steps{display:flex;align-items:center;gap:0;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.step{display:flex;align-items:center;gap:7px;flex-shrink:0}
.step-num{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0}
.step-num.active{border-color:var(--gold);color:var(--gold);background:rgba(249,178,51,.1)}
.step-num.done{border-color:var(--success);background:var(--success);color:#000}
.step-label{font-size:12px;color:var(--muted);white-space:nowrap}
.step-label.active{color:var(--white);font-weight:600}
.step-line{width:20px;height:2px;background:var(--border);flex-shrink:0;margin:0 3px}
.step-line.done{background:var(--success)}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.bar-chart{display:flex;flex-direction:column;gap:9px}
.bar-row{display:flex;align-items:center;gap:9px}
.bar-label{width:80px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.bar-track{flex:1;background:var(--bg3);border-radius:4px;height:20px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 7px;font-size:11px;font-weight:700;transition:width .6s}
.bar-val{font-size:12px;color:var(--muted);min-width:38px;text-align:right;flex-shrink:0}
.dispatch-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px;display:flex;gap:14px;align-items:flex-start}
.dispatch-card.assigned{border-color:var(--info)}
.dispatch-card.completed{border-color:var(--success)}
.dispatch-card.pending{border-color:var(--warn)}
.howto-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;margin-bottom:12px}
.howto-card:hover{border-color:var(--gold)}
.toggle{position:relative;width:40px;height:22px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:11px;transition:.2s}
.toggle-slider:before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
.toggle input:checked+.toggle-slider{background:var(--success)}
.toggle input:checked+.toggle-slider:before{transform:translateX(18px)}
.pricing-card{background:var(--card);border:1px solid var(--card-border);border-radius:14px;padding:22px;text-align:center;cursor:pointer;transition:all .2s}
.pricing-card:hover{transform:translateY(-3px)}
.pricing-card.selected{border-color:var(--gold);border-width:2px;background:rgba(249,178,51,.04)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.portal-link-card{background:rgba(0,212,255,.05);border:1px solid rgba(0,212,255,.2);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;margin-bottom:10px}
.portal-link-card:hover{background:rgba(0,212,255,.1);border-color:var(--cyan)}
.credential-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:13px;font-family:monospace}
.credential-box .cred-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-family:'DM Sans',sans-serif}
.credential-box .cred-value{font-size:16px;font-weight:700;color:var(--gold)}
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-wrap">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-logo">P</div>
    <div class="login-title">Pop's TV Office</div>
    <div class="login-sub">Internal staff portal — select your role to continue</div>

    <div class="login-err" id="login-err">Incorrect username or password.</div>

    <div class="form-label" style="margin-bottom:8px;text-align:center">Select Role</div>
    <div class="login-role-grid" id="role-grid">
      <div class="role-pill" data-role="admin" onclick="selectRole('admin')"><div class="role-icon">👑</div><div class="role-name">Admin</div></div>
      <div class="role-pill" data-role="finance" onclick="selectRole('finance')"><div class="role-icon">💰</div><div class="role-name">Finance</div></div>
      <div class="role-pill" data-role="field" onclick="selectRole('field')"><div class="role-icon">🚗</div><div class="role-name">Field Tech</div></div>
      <div class="role-pill" data-role="programmer" onclick="selectRole('programmer')"><div class="role-icon">💻</div><div class="role-name">Programmer</div></div>
    </div>

    <input class="l-input" id="login-user" placeholder="Username" autocomplete="off">
    <input class="l-input" id="login-pass" placeholder="Password" type="password" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-login" onclick="doLogin()">Access Office →</button>

    <div class="admin-manage-link">Admin only: <a onclick="openManageLogins()">Manage user logins</a></div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" style="display:none">
  <nav class="nav" id="main-nav"></nav>
  <div id="main-content"></div>
</div>

<script>
// ============================================================
// AUTH / ROLES
// ============================================================
const ROLE_ACCESS = {
  admin:      ['dashboard','customers','callcenter','dispatch','portal','logins'],
  finance:    ['dashboard','customers'],
  field:      ['dispatch'],
  programmer: ['portal','customers'],
};

let OFFICE_USERS = [
  {id:1,username:'admin',password:'pops2024',role:'admin',name:'Admin'},
  {id:2,username:'finance1',password:'finance123',role:'finance',name:'Finance User'},
  {id:3,username:'tech1',password:'field123',role:'field',name:'Marcus T.'},
  {id:4,username:'dev1',password:'dev123',role:'programmer',name:'Dev User'},
];

let SESSION = null;

function selectRole(role){
  document.querySelectorAll('.role-pill').forEach(p=>p.classList.remove('selected'));
  document.querySelector(`[data-role="${role}"]`).classList.add('selected');
  APP.loginRole = role;
}

function doLogin(){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pass').value;
  const err = document.getElementById('login-err');
  const match = OFFICE_USERS.find(x=>x.username===u && x.password===p);
  if(!match){ err.classList.add('show'); return; }
  err.classList.remove('show');
  SESSION = match;
  document.getElementById('login-wrap').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  APP.page = ROLE_ACCESS[SESSION.role][0];
  renderApp();
}

function doLogout(){
  SESSION = null;
  APP.page = 'dashboard';
  document.getElementById('login-wrap').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function canAccess(tab){
  if(!SESSION) return false;
  return ROLE_ACCESS[SESSION.role].includes(tab);
}

function openManageLogins(){
  if(!SESSION || SESSION.role !== 'admin'){ showNotif('Admin access required','error'); return; }
  APP.modal = {type:'manageLogins'};
  renderApp();
}

function getInitials(n){return(n||'?').split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2)}
function avatarColor(n){const c=['#ff2d4e','#f9b233','#10d97e','#00d4ff','#7c3aed','#f59e0b'];let h=0;for(let i=0;i<(n||'').length;i++)h=(h*31+(n||'').charCodeAt(i))%c.length;return c[h]}
function fmtPhone(p){const d=p.replace(/\D/g,'');if(d.length===10)return`(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;return p}
function fmtDate(d){if(!d)return'—';try{const[y,m,dy]=d.split('-');return`${m}/${dy}/${y}`}catch(e){return d}}
function daysUntil(d){if(!d)return null;const diff=new Date(d)-new Date();return Math.ceil(diff/(1000*60*60*24))}
function addDays(days){const d=new Date();d.setDate(d.getDate()+days);return d.toISOString().split('T')[0]}
function genUsername(name,phone){const f=(name||'User').split(' ')[0];const dig=(phone||'').replace(/\D/g,'').slice(-4);return f.charAt(0).toUpperCase()+f.slice(1).toLowerCase()+dig}
function genPassword(phone){return(phone||'').replace(/\D/g,'')}

let _notifT;
function showNotif(msg,type='success'){
  if(_notifT)clearTimeout(_notifT);
  const old=document.querySelector('.notif');if(old)old.remove();
  const el=document.createElement('div');
  el.className=`notif${type!=='success'?' '+type:''}`;
  el.textContent=msg;document.body.appendChild(el);
  _notifT=setTimeout(()=>el.remove(),4000);
}

function getStats(){
  const total=customers.length;
  const active=customers.filter(c=>c.status==='active').length;
  const due=customers.filter(c=>c.status==='due').length;
  const overdue=customers.filter(c=>c.status==='overdue').length;
  const rev={'Monthly':25,'Quarterly':65/3,'6-Month':120/6,'Annual':220/12};
  const monthRev=customers.filter(c=>c.status==='active').reduce((a,c)=>a+(rev[c.plan]||0),0);
  const exp7=customers.filter(c=>{const d=daysUntil(c.expiry);return d!==null&&d>=0&&d<=7}).length;
  const exp30=customers.filter(c=>{const d=daysUntil(c.expiry);return d!==null&&d>7&&d<=30}).length;
  return{total,active,due,overdue,monthRev,exp7,exp30};
}

function statusBadge(s){
  const m={active:'Active',due:'Due Soon',overdue:'Overdue',suspended:'Suspended'};
  return`<span class="status s-${s||'suspended'}">${m[s]||s}</span>`;
}

            <div style="width:22px;height:22px;border-radius:50%;background:var(--gold);color:#000;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${si+1}</div>
            <div style="font-size:12px;color:var(--muted);line-height:1.6;padding-top:2px">${s}</div>
          </div>`).join('')}
        </div>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

// ============================================================
// MODALS
// ============================================================
function renderModal(){
  const m=APP.modal;
  let title='',body='';
  
  if(m.type==='sms'){
    const c=customers.find(x=>x.id===m.customerId);
    title=`💬 Text — ${c?c.name:'Customer'}`;
    body=`<div>
      <div style="background:var(--bg3);padding:10px;border-radius:8px;margin-bottom:13px;font-size:12px;color:var(--muted)">
        To: <strong style="color:var(--white)">${c?fmtPhone(c.phone):'—'}</strong>
      </div>
      <div class="form-group"><label class="form-label">Template</label>
        <select class="form-select" onchange="if(this.value!=''){const t=SMS_TEMPLATES[parseInt(this.value)];let msg=t.body;const c=customers.find(x=>x.id===${m.customerId});if(c){msg=msg.replace(/\\[DATE\\]/g,fmtDate(c.expiry)).replace(/\\[USERNAME\\]/g,c.username||'').replace(/\\[PASSWORD\\]/g,genPassword(c.phone)).replace(/\\[NAME\\]/g,c.name);}document.getElementById('sms-body').value=msg;}">
          <option value="">— Custom —</option>
          ${SMS_TEMPLATES.map((t,i)=>`<option value="${i}">${t.type}</option>`).join('')}
        </select>
      </div>
      <div class="form-group"><label class="form-label">Message</label>
        <textarea class="form-textarea" id="sms-body" rows="5">${c?SMS_TEMPLATES[1].body.replace(/\[DATE\]/g,fmtDate(c.expiry)).replace(/\[USERNAME\]/g,c.username||'').replace(/\[PASSWORD\]/g,genPassword(c.phone)):''}</textarea>
      </div>
    </div>`;
  } else if(m.type==='call'){
    const c=customers.find(x=>x.id===m.customerId);
    title=`📞 Call Script — ${c?c.name:'Customer'}`;
    body=`<div>
      <div style="background:var(--bg3);padding:10px;border-radius:8px;margin-bottom:13px;font-size:12px;color:var(--muted)">Calling: <strong style="color:var(--white)">${c?fmtPhone(c.phone):'—'}</strong></div>
      <div class="form-group"><label class="form-label">Script</label>
        <select class="form-select" onchange="const s=VOICE_SCRIPTS[parseInt(this.value)];const el=document.getElementById('call-prev');if(el&&s){const c=customers.find(x=>x.id===${m.customerId});let sc=s.script;if(c)sc=sc.replace(/\\[DATE\\]/g,fmtDate(c.expiry));el.textContent=sc;}">
          ${VOICE_SCRIPTS.map((s,i)=>`<option value="${i}">${s.type}</option>`).join('')}
        </select>
      </div>
      <div id="call-prev" style="background:var(--bg3);border-left:3px solid var(--gold);padding:12px;border-radius:0 8px 8px 0;font-size:12px;color:var(--muted);line-height:1.7;margin-top:10px">
        ${c?VOICE_SCRIPTS[0].script.replace(/\[DATE\]/g,fmtDate(c.expiry)):VOICE_SCRIPTS[0].script}
      </div>
    </div>`;
  } else if(m.type==='addCustomer'||m.type==='editCustomer'){
    const c=m.type==='editCustomer'?customers.find(x=>x.id===m.customerId):null;
    title=c?`✏️ Edit — ${c.name}`:'+ Add Customer';
    body=`<div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Name *</label><input class="form-input" id="m-name" value="${c?c.name:''}"></div>
        <div class="form-group"><label class="form-label">Phone *</label><input class="form-input" id="m-phone" value="${c?c.phone:''}" placeholder="7165550000"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="m-user" value="${c?(c.username||''):''}"></div>
        <div class="form-group"><label class="form-label">Device</label>
          <select class="form-select" id="m-device">${['ONN 4K Stick','ONN HD Stick','Firestick','Smart TV','Android TV','Android Phone'].map(d=>`<option ${c&&c.device===d?'selected':''}>${d}</option>`).join('')}</select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Plan</label>
          <select class="form-select" id="m-plan">${PLANS.map(p=>`<option ${c&&c.plan===p.name?'selected':''}>${p.name}</option>`).join('')}</select>
        </div>
        <div class="form-group"><label class="form-label">Expiry Date</label><input class="form-input" id="m-due" type="date" value="${c?c.expiry:''}"></div>
      </div>
      <div class="form-group"><label class="form-label">Status</label>
        <select class="form-select" id="m-status">${['active','due','overdue','suspended'].map(s=>`<option value="${s}" ${c&&c.status===s?'selected':''}>${s}</option>`).join('')}</select>
      </div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="m-notes" rows="2">${c?c.notes:''}</textarea></div>
    </div>`;
  } else if(m.type==='massAdd'){
    title='⬆️ Mass Add Customers';
    body=`<div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">
        Paste customer data below — one per line. Format:<br>
        <code style="background:var(--bg3);padding:3px 7px;border-radius:4px;font-size:12px">Name, Phone, Plan, ExpiryDate</code>
      </div>
      <div class="form-group">
        <textarea class="form-textarea" id="mass-input" rows="8" placeholder="John Smith, 7165551234, Monthly, 2026-06-01&#10;Jane Doe, 7165555678, Quarterly, 2026-09-01"></textarea>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:10px">Or upload a CSV file:</div>
      <input type="file" accept=".csv" style="font-size:12px;color:var(--muted)">
    </div>`;
  } else if(m.type==='dispatch'){
    const c=customers.find(x=>x.id===m.customerId);
    title=`🚗 Schedule Field Tech — ${c?c.name:'Customer'}`;
    body=`<div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Order Type</label>
          <select class="form-select" id="d-type2"><option>New Install</option><option>Setup Help</option><option>Device Delivery</option><option>Troubleshooting</option></select>
        </div>
        <div class="form-group"><label class="form-label">Assign Tech</label>
          <select class="form-select" id="d-tech2">
            <option>Unassigned</option>${FIELD_TECHS.map(t=>`<option>${t.name}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Schedule</label><input class="form-input" id="d-sched2" type="datetime-local"></div>
      <div class="form-group"><label class="form-label">Notes</label><textarea class="form-textarea" id="d-notes2" rows="2"></textarea></div>
    </div>`;
  } else if(m.type==='addLogin'||m.type==='editLogin'){
    const u=m.type==='editLogin'?OFFICE_USERS.find(x=>x.id===m.userId):null;
    title=u?`✏️ Edit Login — ${u.name}`:'+ Add Login';
    body=`<div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Name</label><input class="form-input" id="lu-name" value="${u?u.name:''}"></div>
        <div class="form-group"><label class="form-label">Username</label><input class="form-input" id="lu-user" value="${u?u.username:''}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Password</label><input class="form-input" id="lu-pass" type="password" placeholder="${u?'Leave blank to keep current':'New password'}"></div>
        <div class="form-group"><label class="form-label">Role</label>
          <select class="form-select" id="lu-role">
            ${['admin','finance','field','programmer'].map(r=>`<option value="${r}" ${u&&u.role===r?'selected':''}>${r.charAt(0).toUpperCase()+r.slice(1)}</option>`).join('')}
          </select>
        </div>
      </div>
    </div>`;
  } else if(m.type==='manageLogins'){
    APP.page='logins';
    APP.modal=null;
    renderApp();
    return '';
  } else if(m.type==='addPortalPhone'){
    title='➕ Add Customer to Portal';
    body=`<div>
      <div class="form-group"><label class="form-label">Customer Phone Number</label>
        <input class="form-input" id="pp-phone" placeholder="(716) 555-0000" style="text-align:center;letter-spacing:2px;font-size:16px">
      </div>
      <div class="form-group"><label class="form-label">Link to Customer Account</label>
        <select class="form-select" id="pp-cust">
          <option value="">— Select customer —</option>
          ${customers.map(c=>`<option value="${c.id}">${c.name} — ${fmtPhone(c.phone)}</option>`).join('')}
        </select>
      </div>
      <div style="background:rgba(0,212,255,.06);border:1px solid rgba(0,212,255,.2);border-radius:8px;padding:10px;font-size:12px;color:var(--muted);margin-top:10px">
        This will allow the customer to log into the portal using their phone number to view their account, tutorials, support, and renewals.
      </div>
    </div>`;
  } else if(m.type==='editPrice'){
    const item=ORDER_ITEMS.find(x=>x.id===m.item);
    title=`✏️ Update Price — ${item?item.name:'Item'}`;
    body=`<div>
      <div class="form-group"><label class="form-label">Current Price</label>
        <div style="font-size:24px;font-weight:700;color:var(--gold);margin-bottom:10px">$${item?item.price.toFixed(2):'—'}</div>
      </div>
      <div class="form-group"><label class="form-label">New Price ($)</label>
        <input class="form-input" id="ep-price" type="number" step="0.01" value="${item?item.price.toFixed(2):''}" style="font-size:16px">
      </div>
      <div class="form-group"><label class="form-label">Update Stock Count</label>
        <input class="form-input" id="ep-stock" type="number" value="${item?item.stock:0}">
      </div>
    </div>`;
  }

  return`<div class="modal-backdrop" onclick="if(event.target.className==='modal-backdrop'){APP.modal=null;renderApp()}">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="close-btn" onclick="APP.modal=null;renderApp()">×</button>
      </div>
      <div class="modal-body">${body}</div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="APP.modal=null;renderApp()">Cancel</button>
        <button class="btn btn-primary" onclick="modalConfirm()">
          ${m.type==='sms'?'📨 Send':m.type==='call'?'📋 Copy Script':m.type==='addCustomer'?'Add Customer':m.type==='editCustomer'?'Save':m.type==='massAdd'?'Import Customers':m.type==='dispatch'?'Create Order':m.type==='addLogin'||m.type==='editLogin'?'Save Login':m.type==='addPortalPhone'?'Grant Access':m.type==='editPrice'?'Update':'Confirm'}
        </button>
      </div>
    </div>
  </div>`;
}

// ============================================================
// ACTIONS
// ============================================================
function nav(page){APP.page=page;APP.modal=null;APP.selectedCustomer=null;renderApp()}
function openAddCustomer(){APP.modal={type:'addCustomer'};renderApp()}
function openOnboarding(){APP.modal={type:'addCustomer'};renderApp()}

function reactivate(id){
  const idx=customers.findIndex(c=>c.id===id);
  if(idx>=0){
    customers[idx].status='active';
    const days={Monthly:30,Quarterly:90,'6-Month':180,Annual:365}[customers[idx].plan]||30;
    customers[idx].expiry=addDays(days);
    showNotif(`✓ ${customers[idx].name} reactivated!`);renderApp();
  }
}

function suspendCustomer(id){
  const idx=customers.findIndex(c=>c.id===id);
  if(idx>=0){customers[idx].status='suspended';showNotif('Account suspended','error');renderApp();}
}

function resendCreds(id){
  const c=customers.find(x=>x.id===id);
  if(!c)return;
  const ph=c.phone.replace(/[^0-9]/g,'');
  const msg="Pop's TV Login\nUsername: "+c.username+"\nPassword: "+c.phone.replace(/\D/g,'')+"\nApp: IPTV Smarters Pro\nServer: popstv.stream:8080";
  if(ph){window.open('sms:'+ph+'?body='+encodeURIComponent(msg));}
  showNotif('📲 Credentials ready to send!','info');
}

function exportCSV(){
  const rows=customers.map(c=>[c.id,c.username,c.phone,c.plan,c.expiry,c.status,c.device].join(','));
  const csv=['ID,Username,Phone,Plan,Expiry,Status,Device',...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv,'+encodeURIComponent(csv);
  a.download='pops_customers.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  showNotif('📤 CSV exported','info');
}

function toggleGuide(i){const k='guide_'+APP.howtoTab+'_'+i;APP[k]=!APP[k];renderApp()}

function copyGuide(i){
  const g=HOWTO_GUIDES[APP.howtoTab]?.[i];
  if(g){const t=`${g.title}\n\n${g.steps.map((s,i)=>`${i+1}. ${s}`).join('\n')}`;navigator.clipboard?.writeText(t).catch(()=>{});showNotif('📋 Guide copied!','info')}
}

function removeLogin(id){
  if(!confirm('Remove this login?'))return;
  const idx=OFFICE_USERS.findIndex(u=>u.id===id);
  if(idx>=0){OFFICE_USERS.splice(idx,1);showNotif('Login removed','info');renderApp();}
}

function createDispatchOrder(){
  const custId=parseInt((document.getElementById('d-customer')||{}).value||'0');
  const c=customers.find(x=>x.id===custId);
  DISPATCH_ORDERS.push({
    id:'D00'+(DISPATCH_ORDERS.length+1),
    customer:c?c.name:'Customer',phone:c?c.phone:'',
    address:(document.getElementById('d-addr')||{}).value||'Buffalo, NY',
    type:(document.getElementById('d-type')||{}).value||'Service Call',
    device:(document.getElementById('d-device')||{}).value||'',
    tech:(document.getElementById('d-tech')||{}).value||'',
    status:'pending',
    scheduled:(document.getElementById('d-sched')||{}).value||'TBD',
    notes:(document.getElementById('d-notes')||{}).value||'',
  });
  showNotif('🚗 Dispatch order created!');APP.dispatchTab='orders';renderApp();
}

function modalConfirm(){
  const m=APP.modal;
  if(m.type==='sms'){showNotif('✓ Text sent!');APP.modal=null;renderApp();}
  else if(m.type==='call'){
    const sc=(document.getElementById('call-prev')||{}).textContent||'';
    navigator.clipboard?.writeText(sc).catch(()=>{});
    showNotif('📋 Script copied!','info');APP.modal=null;renderApp();
  }
  else if(m.type==='addCustomer'){
    const name=(document.getElementById('m-name')||{}).value||'';
    const phone=(document.getElementById('m-phone')||{}).value||'';
    if(!name){showNotif('Name required','error');return;}
    const newId=Math.max(...customers.map(c=>c.id))+1;
    customers.push({
      id:newId,name,phone,
      username:(document.getElementById('m-user')||{}).value||genUsername(name,phone),
      device:(document.getElementById('m-device')||{}).value||'Firestick',
      plan:(document.getElementById('m-plan')||{}).value||'Monthly',
      expiry:(document.getElementById('m-due')||{}).value||addDays(30),
      status:(document.getElementById('m-status')||{}).value||'active',
      notes:(document.getElementById('m-notes')||{}).value||'',
    });
    showNotif(`✓ ${name} added!`);APP.modal=null;renderApp();
  }
  else if(m.type==='editCustomer'){
    const idx=customers.findIndex(x=>x.id===m.customerId);
    if(idx>=0){
      const phone=(document.getElementById('m-phone')||{}).value||customers[idx].phone;
      customers[idx]={...customers[idx],
        name:(document.getElementById('m-name')||{}).value||customers[idx].name,
        phone,
        username:(document.getElementById('m-user')||{}).value||customers[idx].username,
        device:(document.getElementById('m-device')||{}).value||customers[idx].device,
        plan:(document.getElementById('m-plan')||{}).value||customers[idx].plan,
        expiry:(document.getElementById('m-due')||{}).value||customers[idx].expiry,
        status:(document.getElementById('m-status')||{}).value||customers[idx].status,
        notes:(document.getElementById('m-notes')||{}).value||customers[idx].notes,
      };
      showNotif('✓ Customer updated!');APP.modal=null;renderApp();
    }
  }
  else if(m.type==='massAdd'){
    const lines=(document.getElementById('mass-input')||{}).value||'';
    let added=0;
    lines.split('\n').forEach(line=>{
      const parts=line.split(',').map(x=>x.trim());
      if(parts[0]&&parts[1]){
        const newId=Math.max(...customers.map(c=>c.id))+1;
        customers.push({id:newId,name:parts[0],phone:parts[1],username:genUsername(parts[0],parts[1]),plan:parts[2]||'Monthly',expiry:parts[3]||addDays(30),status:'active',device:'Firestick',notes:''});
        added++;
      }
    });
    showNotif(`✓ ${added} customers imported!`);APP.modal=null;renderApp();
  }
  else if(m.type==='dispatch'){
    const c=customers.find(x=>x.id===m.customerId);
    DISPATCH_ORDERS.push({
      id:'D00'+(DISPATCH_ORDERS.length+1),customer:c?c.name:'Customer',phone:c?c.phone:'',address:'Buffalo, NY',
      type:(document.getElementById('d-type2')||{}).value||'Service Call',device:'Firestick',
      tech:(document.getElementById('d-tech2')||{}).value||'',status:'pending',
      scheduled:(document.getElementById('d-sched2')||{}).value||'TBD',
      notes:(document.getElementById('d-notes2')||{}).value||'',
    });
    showNotif('🚗 Dispatch order created!');APP.modal=null;APP.page='dispatch';renderApp();
  }
  else if(m.type==='addLogin'){
    const name=(document.getElementById('lu-name')||{}).value||'';
    const user=(document.getElementById('lu-user')||{}).value||'';
    const pass=(document.getElementById('lu-pass')||{}).value||'';
    const role=(document.getElementById('lu-role')||{}).value||'field';
    if(!name||!user||!pass){showNotif('All fields required','error');return;}
    const newId=Math.max(...OFFICE_USERS.map(u=>u.id))+1;
    OFFICE_USERS.push({id:newId,username:user,password:pass,role,name});
    showNotif(`✓ Login created for ${name}`);APP.modal=null;renderApp();
  }
  else if(m.type==='editLogin'){
    const idx=OFFICE_USERS.findIndex(x=>x.id===m.userId);
    if(idx>=0){
      OFFICE_USERS[idx].name=(document.getElementById('lu-name')||{}).value||OFFICE_USERS[idx].name;
      OFFICE_USERS[idx].username=(document.getElementById('lu-user')||{}).value||OFFICE_USERS[idx].username;
      const newPass=(document.getElementById('lu-pass')||{}).value;
      if(newPass)OFFICE_USERS[idx].password=newPass;
      OFFICE_USERS[idx].role=(document.getElementById('lu-role')||{}).value||OFFICE_USERS[idx].role;
      showNotif('✓ Login updated');APP.modal=null;renderApp();
    }
  }
  else if(m.type==='addPortalPhone'){
    const phone=(document.getElementById('pp-phone')||{}).value||'';
    if(!phone){showNotif('Phone number required','error');return;}
    showNotif('✓ Portal access granted for '+phone,'info');APP.modal=null;renderApp();
  }
  else if(m.type==='editPrice'){
    const newPrice=parseFloat((document.getElementById('ep-price')||{}).value||'0');
    const newStock=parseInt((document.getElementById('ep-stock')||{}).value||'0');
    const item=ORDER_ITEMS.find(x=>x.id===m.item);
    if(item){item.price=newPrice;item.stock=newStock;}
    showNotif('✓ Inventory updated');APP.modal=null;renderApp();
  }
  else{APP.modal=null;renderApp();}
}
